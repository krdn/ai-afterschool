name: AI QA Pipeline

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'prisma/**'
      - '.github/workflows/ai-qa.yml'
      - 'playwright.config.ts'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# 같은 브랜치에서 새 커밋이 푸시되면 이전 실행을 자동 취소
concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 보안 검사 (의존성 취약점 스캔)
  security:
    timeout-minutes: 5
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run npm audit
      run: npm audit --audit-level=high --omit=dev
      # high 이상 취약점 발견 시 경고 (기존 간접 의존성 이슈로 즉시 차단은 보류)
      continue-on-error: true

  # 단위 테스트 (빠르게 실행)
  unit:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate
      env:
        DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

    - name: Run Unit Tests
      run: npm test

  # E2E 테스트 (DB + 앱 서버 필요) — Dependabot PR에서는 skip
  e2e:
    if: github.actor != 'dependabot[bot]'
    timeout-minutes: 20
    runs-on: ubuntu-latest
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ai_afterschool_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_afterschool_test
      SESSION_SECRET: ci-test-session-secret-minimum-32-characters-long
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NODE_ENV: test
      DISABLE_RATE_LIMIT: "true"

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Run Prisma Migrations
      run: npx prisma migrate deploy

    - name: Seed Test Data
      run: npm run db:seed:test

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Cache Next.js build
      uses: actions/cache@v5
      with:
        path: .next/cache
        key: nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
        restore-keys: |
          nextjs-${{ hashFiles('package-lock.json') }}-

    - name: Build Application
      run: npm run build
      env:
        NEXT_PUBLIC_APP_URL: http://localhost:3000

    - name: Run E2E Tests (Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
      run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      env:
        CI: true

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-shard-${{ matrix.shardIndex }}
        path: playwright-report/
        retention-days: 30
