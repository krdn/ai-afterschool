name: AI QA Pipeline

on:
  push:
    paths:
      - 'docs/qa/SCENARIOS.md'
      - 'src/**'
      - 'tests/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    # Note: To use Local LLM generation, use a self-hosted runner 
    # runs-on: self-hosted 

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # Optional: Run Test Generation (Requires LLM Access)
    # - name: Generate Tests
    #   run: npm run test:generate
    #   env:
    #     OLLAMA_HOST: ${{ secrets.OLLAMA_HOST }} 

    - name: Run E2E Tests
      run: npm run test:e2e

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
