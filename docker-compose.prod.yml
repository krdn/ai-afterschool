volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  # caddy_data:
  #   driver: local
  # caddy_config:
  #   driver: local
  # caddy_logs:
  #   driver: local

networks:
  internal:
    driver: bridge
