services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-afterschool-postgres
    environment:
      POSTGRES_DB: ${DATABASE_DB:-ai_afterschool}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  minio:
    image: minio/minio:latest
    container_name: ai-afterschool-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_DEFAULT_BUCKETS: ${MINIO_BUCKET:-reports}
    volumes:
      - minio_data:/data
    ports:
      - "9002:9000"
      - "9003:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - internal

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: production
      args:
        VERSION: ${VERSION:-latest}
        SESSION_SECRET: ${SESSION_SECRET:-default-secret-for-build-min-32-chars-long}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-dummy}
    image: ai-afterschool:${VERSION:-latest}
    container_name: ai-afterschool-migrate
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@postgres:5432/${DATABASE_DB:-ai_afterschool}?connection_limit=10
    user: root
    command: sh -c "pnpm exec prisma migrate deploy && echo 'Migration complete'"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: production
      args:
        VERSION: ${VERSION:-latest}
        SESSION_SECRET: ${SESSION_SECRET:-default-secret-for-build-min-32-chars-long}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-dummy}
    image: ai-afterschool:${VERSION:-latest}
    container_name: ai-afterschool-app
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@postgres:5432/${DATABASE_DB:-ai_afterschool}?connection_limit=10
      DATABASE_URL_PROXY: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@postgres:5432/${DATABASE_DB:-ai_afterschool}?connection_limit=10&pgbouncer=true
      SESSION_SECRET: ${SESSION_SECRET}
      MINIO_ENDPOINT: minio:9000
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-reports}
      PDF_STORAGE_TYPE: ${PDF_STORAGE_TYPE:-s3}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      API_KEY_ENCRYPTION_SECRET: ${API_KEY_ENCRYPTION_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      OLLAMA_DIRECT_URL: ${OLLAMA_DIRECT_URL}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - internal
    # Enable rolling updates
    deploy:
      rollback_config:
        parallelism: 1
        delay: 10s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first

  db-backup:
    image: alpine:latest
    container_name: ai-afterschool-db-backup
    volumes:
      - ./scripts/backup-db.sh:/usr/local/bin/backup-db.sh:ro
      - ./backups:/backups
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      BACKUP_DIR: /backups
      DB_NAME: ${POSTGRES_DB:-ai_afterschool}
      DB_USER: ${POSTGRES_USER:-postgres}
      RETENTION_DAYS: ${RETENTION_DAYS:-30}
      POSTGRES_CONTAINER: ai-afterschool-postgres
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "echo '0 2 * * * /usr/local/bin/backup-db.sh >> /var/log/backup.log 2>&1' | crond -f -l 2"
    restart: unless-stopped
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Caddy disabled - using existing Nginx reverse proxy
